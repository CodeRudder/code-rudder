<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Complex Layout Test Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }

    /* Header */
    .header {
      height: 64px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { width: 40px; height: 40px; background: #3b82f6; border-radius: 4px; }
    .app-name { font-size: 18px; font-weight: 600; color: #1e293b; }

    /* Toolbar */
    .toolbar {
      height: 56px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Content */
    .content {
      display: flex;
      min-height: calc(100vh - 64px - 56px - 80px);
    }
    .sidebar {
      width: 240px;
      background: #f1f5f9;
      border-right: 1px solid #e2e8f0;
      padding: 16px;
    }
    .main-content {
      flex: 1;
      padding: 24px;
    }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    .data-table th,
    .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    .data-table th {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
    }

    /* Footer */
    .footer {
      height: 80px;
      background: #1e293b;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .footer-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .footer-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Buttons */
    button {
      padding: 8px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      cursor: pointer;
      font-size: 14px;
    }
    button.primary {
      background: #3b82f6;
      color: #ffffff;
      border-color: #3b82f6;
    }
    button.danger {
      background: #ef4444;
      color: #ffffff;
      border-color: #ef4444;
    }

    /* Nav items */
    .nav-item {
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .nav-item:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo" id="logo"></div>
      <span class="app-name" id="app-name">Dashboard</span>
      <button id="home-btn">Home</button>
      <button id="projects-btn">Projects</button>
      <button id="tasks-btn">Tasks</button>
    </div>
    <div class="header-right">
      <button id="notifications-btn">🔔</button>
      <button id="settings-btn">⚙️</button>
      <button id="profile-btn">👤</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="new-btn" class="primary">New</button>
      <button id="edit-btn">Edit</button>
      <button id="delete-btn" class="danger">Delete</button>
    </div>
    <div class="toolbar-right">
      <button id="filter-btn">Filter</button>
      <button id="sort-btn">Sort</button>
      <button id="export-btn">Export</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="nav-item" id="nav-dashboard">Dashboard</div>
      <div class="nav-item" id="nav-analytics">Analytics</div>
      <div class="nav-item" id="nav-reports">Reports</div>
      <div class="nav-item" id="nav-settings">Settings</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h2 id="page-title">Data Overview</h2>

      <!-- Action buttons -->
      <div style="margin: 16px 0; display: flex; gap: 12px;">
        <button id="refresh-btn" class="primary">Refresh</button>
        <button id="download-btn">Download</button>
        <button id="share-btn">Share</button>
      </div>

      <!-- Data Table -->
      <table class="data-table" id="data-table">
        <thead>
          <tr>
            <th id="col-id">ID</th>
            <th id="col-name">Name</th>
            <th id="col-status">Status</th>
            <th id="col-date">Date</th>
            <th id="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>001</td>
            <td>Project Alpha</td>
            <td>Active</td>
            <td>2026-02-07</td>
            <td>
              <button id="view-btn-1">View</button>
              <button id="edit-btn-1">Edit</button>
            </td>
          </tr>
          <tr>
            <td>002</td>
            <td>Project Beta</td>
            <td>Pending</td>
            <td>2026-02-06</td>
            <td>
              <button id="view-btn-2">View</button>
              <button id="edit-btn-2">Edit</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">
      <span id="copyright">© 2026 Dashboard</span>
      <button id="privacy-btn">Privacy</button>
      <button id="terms-btn">Terms</button>
    </div>
    <div class="footer-right">
      <button id="help-btn">Help</button>
      <button id="contact-btn">Contact</button>
      <button id="about-btn">About</button>
    </div>
  </div>
</body>
</html>
